<!DOCTYPE html>
<html>
<head>
	<!-- META ATTRIBUTES -->
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<!-- WEBSITE -->
	<title>Classmate Tracker | 10R 25-26</title>
	<link rel="icon" type="image/x-icon" href="favicon.png">

	<!-- PYTHON -->
	<link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
	<script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

	<!-- BS5 -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

	<!-- CSS -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
	<link rel="stylesheet" href="style.css">

	<style>
		/* FORM */
		.input-card {
			background: rgba(255, 240, 238, 0.42);
			border: 0.5px solid rgba(180, 120, 125, 0.28);
			padding: 2rem;
			border-radius: 16px;
			box-shadow: 0 10px 30px rgba(192, 118, 122, 0.25);
			width: 100%;
			max-width: 550px;
			position: relative;
			margin-bottom: 1.5rem;
			margin: 0 auto
		}

		.input-card::before {
			content: '';
			position: absolute;
			inset: 0;
			border-radius: 16px;
			background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
			pointer-events: none;
		}

		.field {
			margin-bottom: 1rem !important;
		}

		.form-label {
			font-weight: 670;
			font-size: 1rem;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: rgba(130, 70, 75, 0.7);
			margin-bottom: 5px;
			display: block;
		}

		.form-control {
			background: rgba(255, 248, 246, 0.6) !important;
			border: 0.5px solid rgba(180, 120, 125, 0.35) !important;
			color: var(--wine) !important;
			transition: border-color 0.15s, background 0.15s !important;
		}
		
		.form-control::placeholder {
			color: var(--wine);
		}

		.form-control:hover {
			border-color: rgba(192, 118, 122, 0.5) !important;
		}

		.form-control:focus {
			border-color: rgba(160, 90, 95, 0.55) !important;
			background: rgba(255, 248, 246, 0.85) !important;
			outline: none !important;
			box-shadow: none !important;
		}

		.btnGroup {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 10px;
		}
			
		button {
			padding: 10px 0;
			border-radius: 8px;
			font-family: 'Space Mono', monospace;
			font-size: 1.1rem;
			font-weight: 700;
			text-transform: uppercase;
			cursor: pointer;
			letter-spacing: 0.06em;
			transition: all 0.15s ease;
			border: 0.5px solid rgba(180, 120, 125, 0.38);
		}

		button:last-child { background: #a55a5c; color: #fff8f6; }
		button:last-child:hover { background: #b86668; }
 
		button:first-child { background: rgba(160, 90, 95, 0.28); color: #5a2a2c; }
		button:first-child:hover { background: rgba(160, 90, 95, 0.44); }

		button:active { transform: scale(0.97); }

		/* OUTPUT */
		#cardContainer {
			width: 100%;
			max-width: 550px;
			display: flex;
			flex-direction: column;
			gap: 10px;
			max-height: none; 
   			overflow-y: visible;
		}

		.classmate-card {
			background: rgba(255, 240, 238, 0.35);
			border: 0.5px solid rgba(180, 120, 125, 0.22);
			border-radius: 16px;
			align-items: center;
			color: var(--wine);
			padding: 16px 20px;
			margin: 0 auto 0.2rem auto;
			width: 100%;
		}

		.classmate-card .name {
			font-size: 1.2rem;
			margin: 0 0 4px;
			line-height: 1.6;
			color: var(--wine);
		}

		.classmate-card .meta {
			font-size: 1.1rem;
			margin: 0;
			line-height: 1.6;
			color: rgba(130, 70, 75, 0.7);
		}

		.classmate-card strong {
			color: #8a4a4c;
		}

		/* LAYOUT */
		.app-layout {
			display: flex;
			flex-direction: column;
			align-items: center;
			width: 100%;
			max-width: 550px;
			margin: 2rem auto;
			padding: 0 20px;
			gap: 40px;
		}

		/* RESPONSIVE */
		@media (min-width: 992px) {
			.app-layout {
				flex-direction: row;
				justify-content: center;
				align-items: center;
				max-width: 1140px;
			}

			.input-card {
				flex-shrink: 0;
				justify-content: center;
				align-items: center;
			}

			#cardContainer {
				max-height: 500px;
				overflow-y: auto;
			}

			#cardContainer::-webkit-scrollbar {
       			width: 6px;
			}
			#cardContainer::-webkit-scrollbar-track {
				background: transparent;
			}
			#cardContainer::-webkit-scrollbar-thumb {
				background: rgba(192, 118, 122, 0.3);
				border-radius: 10px;
			}
			#cardContainer::-webkit-scrollbar-thumb:hover {
				background: rgba(192, 118, 122, 0.5);
			}
		}

		@media (max-width: 991.98px) {
			.navbar-collapse {
				background: #f5e4e2; 
				border-radius: 12px;
				padding: 1rem;
				margin-top: 10px;
				box-shadow: 0 10px 25px rgba(192, 118, 122, 0.2);
			}
		}
	</style>
</head>
<body>
	<!-- NAVBAR -->
	<nav class="navbar navbar-expand-lg fixed-top">
		<div class="container-fluid">
			<a class="navbar-brand ms-3" href="#">10-Ruby SY 2526</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarSupportedContent">
				<ul class="navbar-nav mb-2 mb-lg-0 ms-auto me-3">
					<li class="nav-item px-3">
						<a class="nav-link active" href="classmates.html">Classmates</a>
					</li>
					<li class="nav-item px-3">
						<a class="nav-link" href="attendance.html">Attendance</a>
					</li>
					<li class="nav-item px-3">
						<a class="nav-link" href="gallery.html">Gallery</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<!-- HEADER -->
	<div class="animate__animated animate__fadeInDown">
		<p id="schoolYear" class="text-center mt-5">♡ S.Y. 2025-2026 ♡</p>
		<h1 class="text-center">classmate tracker</h1>
	</div>
	

	<!-- CLASSMATE TRACKER -->
	<div class="app-layout animate__animated animate__fadeIn">
		<div class="input-card">
			<div class="field">
				<label class="form-label" for="nameInput">Full Name</label>
				<input type="text" class="form-control" id="nameInput" placeholder="e.g. Rendell Peña">
			</div>
			<div class="field">
				<label class="form-label" for="sectionInput">Section</label>
				<input type="text" class="form-control" id="sectionInput" placeholder="e.g. Ruby">
			</div>
			<div class="field">
				<label class="form-label" for="subjectInput">Favorite Subject</label>
				<input type="text" class="form-control" id="subjectInput" placeholder="e.g. Philosophy">
			</div>
		
			<div class="btnGroup" style="margin-top: 25px;">
				<button py-click="addClassmates">+ Add Classmate</button>
				<button py-click="displayClassmates">View All →</button>
			</div>
		</div>

		<!-- OUTPUT DIV -->
		<div id="cardContainer"></div>	
	</div>
	
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
	<py-script src="classmates.py"></py-script>
</body>
</html>
